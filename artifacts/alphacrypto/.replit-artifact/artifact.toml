kind = "web"
previewPath = "/"
title = "AlphaCrypto"
version = "1.0.0"
id = "artifacts/alphacrypto"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21158

[services.development]
run = "pnpm --filter @workspace/alphacrypto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alphacrypto", "run", "build" ]
serve = "static"
publicDir = "artifacts/alphacrypto/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21158"
BASE_PATH = "/"
